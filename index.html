<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<style>
	*{margin:0;padding:0}
	html,body{width:100%;height:100%;overflow:hidden;background:#000}
	#player-container{width:100vw;height:100vh}
	#player-container iframe{width:100%!important;height:100%!important}
	#error{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
		background:#111;color:#888;font-family:sans-serif;
		justify-content:center;align-items:center;flex-direction:column;text-align:center;z-index:10}
	#error.show{display:flex}
	#error h2{color:#ccc;margin-bottom:8px}
</style>
</head>
<body>
<div id="player-container"><div id="yt-player"></div></div>
<div id="error"><h2>Video Unavailable</h2><p id="error-msg"></p></div>

<script>
// ── State ──────────────────────────────────────────────────
var ytPlayer      = null;
var currentVideoId = '';
var targetVolume  = 50;      // 0-100 scale for YT API
var apiReady      = false;
var playerReady   = false;
var unmuted       = false;

function getHashParams() {
	var h = window.location.hash.substring(1);
	if (!h) return {};
	var p = {};
	new URLSearchParams(h).forEach(function(v, k) { p[k] = v; });
	return p;
}

// ── Player creation ────────────────────────────────────────
function createPlayer(videoId, startTime) {
	if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} ytPlayer = null; }
	playerReady = false;
	unmuted = false;
	currentVideoId = videoId;

	var container = document.getElementById('player-container');
	container.innerHTML = '<div id="yt-player"></div>';
	document.getElementById('error').className = '';

	ytPlayer = new YT.Player('yt-player', {
        // Nocookie host actively suppresses the vast majority of pre-roll ads
        host: 'https://www.youtube-nocookie.com',
		width: '100%',
		height: '100%',
		videoId: videoId,
		playerVars: {
			autoplay: 1,
			mute: 1,
			controls: 0,
			disablekb: 1,
			modestbranding: 1,
			rel: 0,
			showinfo: 0,
			iv_load_policy: 3,
			cc_load_policy: 0,
			playsinline: 1,
			enablejsapi: 1,
			origin: window.location.origin,
			start: Math.floor(startTime) || 0
		},
		events: {
			onReady: onPlayerReady,
			onStateChange: onPlayerStateChange,
			onError: onPlayerError
		}
	});
}

// ── YT Callbacks ───────────────────────────────────────────
function onPlayerReady(event) {
	playerReady = true;
	event.target.mute();
	event.target.playVideo();

	// Staggered unmute attempts. Chromium strictly requires playback to begin before unmuting.
	setTimeout(tryUnmute, 500);
	setTimeout(tryUnmute, 1500);
	setTimeout(tryUnmute, 3000);
}

function onPlayerStateChange(event) {
	if (event.data === YT.PlayerState.PLAYING) {
		tryUnmute();
	}
	if (event.data === YT.PlayerState.ENDED) {
		ytPlayer.seekTo(0, true);
		ytPlayer.pauseVideo();
	}
}

function onPlayerError(event) {
	var errors = {
		2:   'Invalid video ID',
		5:   'Cannot play in embedded player',
		100: 'Video not found or private',
		101: 'Embedding blocked by owner',
		150: 'Embedding blocked by owner'
	};
	document.getElementById('error-msg').textContent = errors[event.data] || 'Error ' + event.data;
	document.getElementById('error').className = 'show';
}

function tryUnmute() {
    if (!ytPlayer || !playerReady || unmuted) return;
    try {
        var state = ytPlayer.getPlayerState();
        // NEVER unmute while buffering, Chrome will block the video playback entirely
        if (state === YT.PlayerState.PLAYING) { 
            ytPlayer.unMute();
            ytPlayer.setVolume(targetVolume);
            unmuted = true;
        }
    } catch(e) {}
}

// ── Hash-change handler (C# → JS communication) ───────────
window.addEventListener('hashchange', function() {
	var p = getHashParams();
	if (!p.v) return;

	if (p.v !== currentVideoId) {
		targetVolume = Math.round((parseFloat(p.vol) || 0.5) * 100);
		if (playerReady && ytPlayer) {
			currentVideoId = p.v;
			unmuted = false;
			ytPlayer.loadVideoById({
				videoId: p.v,
				startSeconds: parseFloat(p.t) || 0
			});
		} else {
			createPlayer(p.v, parseFloat(p.t) || 0);
		}
		return;
	}

	if (!ytPlayer || !playerReady) return;

	if (p.vol !== undefined) {
		var vol = parseFloat(p.vol);
		if (!isNaN(vol)) {
			targetVolume = Math.round(vol * 100);
			try {
				ytPlayer.unMute();
				ytPlayer.setVolume(targetVolume);
				unmuted = true;
			} catch(e) {}
		}
	}

	try {
		switch (p.cmd) {
			case 'pause':
				ytPlayer.pauseVideo();
				break;
			case 'play':
				ytPlayer.playVideo();
				break;
			case 'seek':
				ytPlayer.seekTo(parseFloat(p.t) || 0, true);
				break;
			case 'sync':
				if (p.paused === '1') {
					ytPlayer.pauseVideo();
                    var target = parseFloat(p.t) || 0;
                    if (Math.abs(ytPlayer.getCurrentTime() - target) > 1) {
                        ytPlayer.seekTo(target, true);
                    }
				} else {
					var state = ytPlayer.getPlayerState();
					if (state !== YT.PlayerState.PLAYING && state !== YT.PlayerState.BUFFERING) {
						ytPlayer.playVideo();
					}
                    
                    // ANTI-STUTTER LOGIC
                    // We only force a seek if the video is currently playing and has drifted more than 3.5 seconds.
                    // This allows natural buffering to resolve itself without the C# loop interupting it every 1 second.
                    if (state === YT.PlayerState.PLAYING) {
                        var target = parseFloat(p.t) || 0;
                        var current = ytPlayer.getCurrentTime() || 0;
                        if (Math.abs(current - target) > 3.5) {
                            ytPlayer.seekTo(target, true);
                        }
                    }
				}
				break;
		}
	} catch(e) {}
});

// ── Bootstrap ──────────────────────────────────────────────
var initParams = getHashParams();
if (initParams.vol) targetVolume = Math.round((parseFloat(initParams.vol) || 0.5) * 100);

window.onYouTubeIframeAPIReady = function() {
	apiReady = true;
	if (initParams.v) {
		createPlayer(initParams.v, parseFloat(initParams.t) || 0);
	}
};
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
