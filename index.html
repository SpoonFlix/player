<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Media Player - Request</title>
    <meta name="description" content="Media Player request page.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Oswald:400,500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Oswald', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .content-container {
            background-color: #1e1e1e;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-weight: 400;
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        .services {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .media-service {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 130px;
            height: 130px;
            background-color: #2a2a2a;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .media-service img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .media-service:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .logo-youtube:hover {
            background-color: #FF0000;
        }

        .logo-twitch:hover {
            background-color: #9146FF;
        }

        .logo-soundcloud:hover {
            background-color: #FF5500;
        }
    </style>
</head>
<body>

    <div class="content-container">
        <h1>Share media from one of the selected services</h1>
        
        <div class="services">
            <a href="http://www.youtube.com/" class="media-service logo-youtube">
                <img src="YouTube.png" alt="YouTube">
                <span>YouTube</span>
            </a> 
            
            <a href="http://www.twitch.tv/" class="media-service logo-twitch">
                <img src="Twitch.png" alt="Twitch">
                <span>Twitch</span>
            </a> 
            
            <a href="http://soundcloud.com/search" class="media-service logo-soundcloud">
                <img src="SoundCloud.png" alt="SoundCloud">
                <span>SoundCloud</span>
            </a> 
        </div>
    </div>

</body>
</html>
