<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
    video { width: 100%; height: 100%; object-fit: contain; }
    
    /* ── IN-GAME DEBUG OVERLAY ── */
    #debug-log {
        position: absolute; top: 10px; left: 10px; width: 400px; max-height: 80%; 
        background: rgba(0,0,0,0.85); color: #fff; font-size: 12px; padding: 10px; 
        border-radius: 5px; overflow-y: auto; pointer-events: none; z-index: 9999;
        border: 1px solid #333;
    }
    .log-entry { margin-bottom: 4px; word-wrap: break-word; }
    .log-err { color: #FF7F50; font-weight: bold; } /* Coral accent for visibility */
    .log-warn { color: #FFD700; }
    .log-info { color: #00BFFF; }

    #unmute-overlay { 
        display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.7); color: #fff; font-family: sans-serif; 
        justify-content: center; align-items: center; z-index: 100; font-size: 24px; font-weight: bold;
    }
</style>
</head>
<body>
<video id="vid" playsinline></video>
<div id="unmute-overlay">Waiting for S&box UI Interaction...</div>

<div id="debug-log"></div>

<script>
    var vid = document.getElementById('vid');
    var overlay = document.getElementById('unmute-overlay');
    var debugDiv = document.getElementById('debug-log');
    var currentVideoId = '';

    // ── DEBUG LOGGER ──
    function log(msg, type = 'info') {
        var el = document.createElement('div');
        el.className = 'log-entry log-' + type;
        el.textContent = '[' + new Date().toISOString().substring(11, 19) + '] ' + msg;
        debugDiv.appendChild(el);
        debugDiv.scrollTop = debugDiv.scrollHeight;
    }

    // Catch unhandled JS errors
    window.onerror = function(msg, url, line) { log("JS ERROR: " + msg + " (Line " + line + ")", 'err'); };

    // Catch HTML5 Video playback/decoding errors
    vid.addEventListener('error', function(e) {
        var errCode = vid.error ? vid.error.code : 'Unknown';
        var errMsg = vid.error ? vid.error.message : 'No message';
        log("VIDEO FATAL ERROR (Code " + errCode + "): " + errMsg, 'err');
    });

    vid.addEventListener('loadstart', () => log("Video loadstart triggered..."));
    vid.addEventListener('loadeddata', () => log("Video data loaded successfully.", 'info'));
    vid.addEventListener('waiting', () => log("Video buffering..."));
    vid.addEventListener('playing', () => log("Video is playing visually.", 'info'));

    log("HTML Wrapper initialized and waiting for C# hashchange...", 'info');

    // ── C# COMMUNICATION ──
    window.addEventListener('hashchange', function() {
        var h = window.location.hash.substring(1);
        var p = new URLSearchParams(h);
        
        var vId = p.get('v');
        var newUrl = p.get('url');
        
        if (vId && vId !== currentVideoId && newUrl) {
            log("C# requested new video: " + vId);
            
            var decodedUrl = decodeURIComponent(newUrl);
            log("Raw stream URL length: " + decodedUrl.length);
            
            currentVideoId = vId;
            vid.src = decodedUrl;
            vid.currentTime = parseFloat(p.get('t')) || 0;
            vid.muted = true; 
            
            var playPromise = vid.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    vid.muted = false;
                    if (vid.muted) overlay.style.display = 'flex'; 
                }).catch(error => {
                    log("Autoplay blocked by browser policy. Awaiting UI click.", 'warn');
                    overlay.style.display = 'flex';
                });
            }
        }

        var vol = p.get('vol');
        if (vol !== null) {
            vid.volume = parseFloat(vol);
            if (vid.muted) {
                vid.muted = false;
                overlay.style.display = 'none';
            }
        }

        var cmd = p.get('cmd');
        var t = parseFloat(p.get('t')) || 0;
        
        if (cmd === 'sync') {
            if (p.get('paused') === '1') {
                vid.pause();
                if (Math.abs(vid.currentTime - t) > 0.5) vid.currentTime = t;
            } else {
                if (vid.paused) vid.play();
                if (Math.abs(vid.currentTime - t) > 3) {
                    log("Drift detected. Seeking to " + t, 'warn');
                    vid.currentTime = t;
                }
            }
            if (!vid.muted) overlay.style.display = 'none';
        }
    });
</script>
</body>
</html>
