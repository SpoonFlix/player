<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<style>
	*{margin:0;padding:0}
	html,body{width:100%;height:100%;overflow:hidden;background:#000}
	iframe{width:100vw;height:100vh;border:none;position:fixed;top:0;left:0}
	#error{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
		background:#111;color:#888;font-family:sans-serif;
		justify-content:center;align-items:center;flex-direction:column;text-align:center;z-index:10}
	#error.show{display:flex}
	#error h2{color:#ccc;margin-bottom:8px}
</style>
</head>
<body>
<div id="error"><h2>Video Unavailable</h2><p id="error-msg"></p></div>
<script>
(function() {
	'use strict';

	var iframe = null;
	var currentVideoId = '';
	var currentVol = 0.5;

	function getHashParams() {
		var h = window.location.hash.substring(1);
		if (!h) return {};
		var p = {};
		new URLSearchParams(h).forEach(function(v,k){ p[k]=v; });
		return p;
	}

	function buildSrc(videoId, startTime) {
		return 'https://www.youtube.com/embed/' + videoId
			+ '?autoplay=1&controls=0&disablekb=1&modestbranding=1&rel=0&showinfo=0'
			+ '&iv_load_policy=3&cc_load_policy=0&playsinline=1&mute=1'
			+ '&enablejsapi=1&origin=' + encodeURIComponent(window.location.origin)
			+ (startTime > 0 ? '&start=' + Math.floor(startTime) : '');
	}

	function createPlayer(videoId, startTime, vol) {
		currentVideoId = videoId;
		currentVol = vol;
		document.getElementById('error').className = '';

		if (iframe) { iframe.remove(); iframe = null; }

		iframe = document.createElement('iframe');
		iframe.src = buildSrc(videoId, startTime);
		iframe.referrerPolicy = 'strict-origin-when-cross-origin';
		iframe.allow = 'autoplay; fullscreen; encrypted-media';
		iframe.allowFullscreen = true;
		iframe.style.cssText = 'width:100vw;height:100vh;border:none;position:fixed;top:0;left:0';
		document.body.appendChild(iframe);

		iframe.onload = function() {
			// Register to receive YouTube state events
			registerListener();
			// Unmute and set volume after YouTube player initializes
			setTimeout(function() { cmd('unMute'); cmd('setVolume', [vol * 100]); }, 1500);
			setTimeout(function() { cmd('unMute'); cmd('setVolume', [vol * 100]); }, 3000);
		};
	}

	// Send a command to the YouTube player via postMessage
	function cmd(func, args) {
		if (!iframe || !iframe.contentWindow) return;
		try {
			iframe.contentWindow.postMessage(JSON.stringify({
				event: 'command',
				func: func,
				args: args || []
			}), '*');
		} catch(e) {}
	}

	// Tell YouTube to send us state change events
	function registerListener() {
		if (!iframe || !iframe.contentWindow) return;
		try {
			iframe.contentWindow.postMessage(JSON.stringify({
				event: 'listening',
				id: 'player',
				channel: 'widget'
			}), '*');
		} catch(e) {}
	}

	// Listen for YouTube player events
	window.addEventListener('message', function(e) {
		if (!e.data || typeof e.data !== 'string') return;
		try {
			var data = JSON.parse(e.data);

			// Error
			if (data.event === 'onError') {
				var errors = {
					2:'Invalid video ID', 5:'Cannot play in embedded player',
					100:'Video not found or private', 101:'Embedding blocked', 150:'Embedding blocked'
				};
				document.getElementById('error-msg').textContent = errors[data.info] || 'Error ' + data.info;
				document.getElementById('error').className = 'show';
			}

			// Video ended — seek to start and pause instead of showing replay UI
			if (data.event === 'onStateChange' && data.info === 0) {
				cmd('seekTo', [0, true]);
				cmd('pauseVideo');
			}
		} catch(e) {}
	});

	// Hash-change handler — S&box sends commands by changing the URL hash
	window.addEventListener('hashchange', function() {
		var p = getHashParams();
		if (!p.v) return;

		// New video
		if (p.v !== currentVideoId) {
			createPlayer(p.v, parseFloat(p.t)||0, parseFloat(p.vol)||0.5);
			return;
		}

		// Volume
		if (p.vol !== undefined) {
			var vol = parseFloat(p.vol);
			if (!isNaN(vol)) {
				cmd('unMute');
				cmd('setVolume', [vol * 100]);
				currentVol = vol;
			}
		}

		switch(p.cmd) {
			case 'pause': cmd('pauseVideo'); break;
			case 'play':  cmd('playVideo');  break;
			case 'seek':  cmd('seekTo', [parseFloat(p.t)||0, true]); break;
			case 'sync':
				// Sync: ensure correct play/pause state and seek to expected time
				if (p.paused === '1') {
					cmd('pauseVideo');
				} else {
					cmd('playVideo');
				}
				cmd('seekTo', [parseFloat(p.t)||0, true]);
				break;
		}
	});

	// Keep re-registering for events (in case iframe reloads internally)
	setInterval(registerListener, 3000);

	// Initial load
	var p = getHashParams();
	if (p.v) createPlayer(p.v, parseFloat(p.t)||0, parseFloat(p.vol)||0.5);
})();
</script>
</body>
</html>
