<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; }
    #unmute-overlay { 
        display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.7); color: #fff; font-family: sans-serif; 
        justify-content: center; align-items: center; z-index: 100; font-size: 24px; font-weight: bold;
    }
</style>
</head>
<body>
<video id="vid" playsinline></video>
<div id="unmute-overlay">Waiting for S&box UI Interaction...</div>

<script>
    var vid = document.getElementById('vid');
    var overlay = document.getElementById('unmute-overlay');
    var currentVideoId = '';

    window.addEventListener('hashchange', function() {
        var h = window.location.hash.substring(1);
        var p = new URLSearchParams(h);
        
        var vId = p.get('v');
        var newUrl = p.get('url');
        
        // ── LOAD NEW VIDEO ──
        if (vId && vId !== currentVideoId && newUrl) {
            currentVideoId = vId;
            vid.src = decodeURIComponent(newUrl);
            vid.currentTime = parseFloat(p.get('t')) || 0;
            
            // Chromium requires videos to be muted to autoplay
            vid.muted = true; 
            var playPromise = vid.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // Try to unmute once frames are moving
                    vid.muted = false;
                    if (vid.muted) overlay.style.display = 'flex'; 
                }).catch(error => {
                    overlay.style.display = 'flex';
                });
            }
        }

        // ── HANDLE VOLUME ──
        var vol = p.get('vol');
        if (vol !== null) {
            vid.volume = parseFloat(vol);
            // If C# sends a volume command (user adjusted slider), the browser considers
            // this an interaction and will finally allow us to unmute.
            if (vid.muted) {
                vid.muted = false;
                overlay.style.display = 'none';
            }
        }

        // ── HANDLE SYNC ──
        var cmd = p.get('cmd');
        var t = parseFloat(p.get('t')) || 0;
        
        if (cmd === 'sync') {
            if (p.get('paused') === '1') {
                vid.pause();
                if (Math.abs(vid.currentTime - t) > 0.5) vid.currentTime = t;
            } else {
                if (vid.paused) vid.play();
                // Anti-stutter: Only force a seek if the video has drifted more than 3 seconds
                if (Math.abs(vid.currentTime - t) > 3) vid.currentTime = t;
            }
            
            // Clear overlay if audio successfully activated
            if (!vid.muted) overlay.style.display = 'none';
        }
    });
</script>
</body>
</html>
